@if (isOpen) {
  <div class="drawer-overlay" (click)="onClose()"></div>
  <aside class="drawer">
    <header class="drawer-header">
      <h2>{{ title }}</h2>
      <button class="close-btn" (click)="onClose()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </header>
    <div class="drawer-content">
      <ng-content></ng-content>
    </div>
  </aside>
}
